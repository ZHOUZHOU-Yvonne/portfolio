<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>密码生成器 | DevTools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0}
.wrap{max-width:600px;margin:0 auto;padding:20px}
header{background:#1e293b;padding:16px 20px;margin-bottom:30px;border-bottom:1px solid #334155}
header a{color:#3b82f6;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px;color:#f8fafc}
.desc{color:#94a3b8;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px}
.result{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:20px;font-family:'SF Mono',Monaco,monospace;font-size:22px;text-align:center;word-break:break-all;margin-bottom:20px;color:#86efac;min-height:60px;display:flex;align-items:center;justify-content:center}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1e293b}
.row label{font-size:14px;color:#cbd5e1}
.row input[type=range]{width:120px}
.row input[type=checkbox]{width:18px;height:18px;accent-color:#3b82f6}
.length-val{color:#3b82f6;font-weight:700;min-width:30px;text-align:right}
.strength{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.strength.weak{background:#7f1d1d;color:#fca5a5}
.strength.medium{background:#78350f;color:#fcd34d}
.strength.strong{background:#14532d;color:#86efac}
.btn{width:100%;padding:14px;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;margin:8px 0}
.btn.primary{background:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}
.btn.secondary{background:#1e293b;border:1px solid #334155;color:#e2e8f0}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>🔑 密码生成器</h1>
<p class="desc">生成高强度随机密码。自定义长度和字符集。</p>
<div class="card">
<div class="result" id="result">点击生成</div>
<div class="row"><label>密码长度</label><input type="range" id="length" min="8" max="64" value="20" oninput="updateLength()"><span class="length-val" id="lenVal">20</span></div>
<div class="row"><label>包含大写字母 (A-Z)</label><input type="checkbox" id="upper" checked onchange="gen()"></div>
<div class="row"><label>包含小写字母 (a-z)</label><input type="checkbox" id="lower" checked onchange="gen()"></div>
<div class="row"><label>包含数字 (0-9)</label><input type="checkbox" id="numbers" checked onchange="gen()"></div>
<div class="row"><label>包含特殊符号 (!@#$)</label><input type="checkbox" id="symbols" checked onchange="gen()"></div>
<button class="btn primary" onclick="gen()">生成密码</button>
<button class="btn secondary" onclick="copyPwd()">复制密码</button>
</div>
</div>
<script>
function updateLength(){document.getElementById('lenVal').textContent=document.getElementById('length').value;gen()}
function gen(){const len=+document.getElementById('length').value;let chars='';if(document.getElementById('upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('numbers').checked)chars+='0123456789';if(document.getElementById('symbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';if(!chars){document.getElementById('result').textContent='请至少选择一种字符集';return}const arr=new Uint32Array(len);crypto.getRandomValues(arr);let pwd='';for(let i=0;i<len;i++)pwd+=chars[arr[i]%chars.length];document.getElementById('result').textContent=pwd;updateStrength(pwd)}
function updateStrength(p){const s=document.getElementById('result');let score=0;if(p.length>=12)score++;if(p.length>=20)score++;if(/[A-Z]/.test(p))score++;if(/[a-z]/.test(p))score++;if(/[0-9]/.test(p))score++;if(/[^A-Za-z0-9]/.test(p))score++;s.style.color=score<=2?'#fca5a5':score<=4?'#fcd34d':'#86efac'}
function copyPwd(){const t=document.getElementById('result').textContent;if(t&&t!=='点击生成'){navigator.clipboard.writeText(t)}}
window.onload=gen;
</script>
</body>
</html>

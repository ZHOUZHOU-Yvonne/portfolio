<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="免费在线Markdown转PDF工具，支持实时预览、代码高亮、自定义样式。">
<title>Markdown 转 PDF | DevTools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
header{background:#1e293b;padding:16px 20px;border-bottom:1px solid #334155;margin-bottom:20px}
header a{color:#3b82f6;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px;color:#f8fafc}
.desc{color:#94a3b8;margin-bottom:20px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.split{grid-template-columns:1fr}}
.panel h3{font-size:13px;color:#94a3b8;margin-bottom:8px;letter-spacing:1px}
textarea{width:100%;height:450px;padding:16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:'SF Mono',Monaco,monospace;font-size:13px;resize:vertical}
.preview{border:1px solid #334155;border-radius:8px;padding:24px;height:450px;overflow:auto;background:#fff;color:#1e293b;line-height:1.8}
.preview h1,.preview h2,.preview h3{color:#1e293b;margin:12px 0 8px}
.preview p{margin:8px 0}
.preview code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px;color:#e11d48}
.preview pre{background:#1e293b;padding:16px;border-radius:8px;overflow:auto;margin:8px 0}
.preview pre code{background:none;color:#86efac;padding:0}
.preview blockquote{border-left:3px solid #3b82f6;padding-left:16px;color:#64748b;margin:8px 0}
.btn-bar{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.btn{padding:8px 16px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;border-radius:6px;cursor:pointer;font-size:13px}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn:hover{opacity:.9}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>📄 Markdown 转 PDF</h1>
<p class="desc">编辑 Markdown → 实时预览 → 导出为 PDF。支持代码高亮。</p>
<div class="btn-bar">
  <button class="btn primary" onclick="exportPDF()">导出 PDF</button>
  <button class="btn" onclick="loadSample()">加载示例</button>
</div>
<div class="split">
  <div class="panel"><h3>Markdown</h3><textarea id="input" oninput="render()"># Welcome
## Markdown to PDF
Convert your **Markdown** to PDF with live preview.

- Write markdown
- Preview in real-time
- Export to PDF
> One click export

`inline code`

```python
print("Hello, World!")
```</textarea></div>
  <div class="panel"><h3>预览</h3><div class="preview" id="preview"></div></div>
</div>
</div>
<script>
function render(){
  let h = document.getElementById('input').value
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h = h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  h = h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  h = '<p>'+h.replace(/\n{2,}/g,'</p><p>')+'</p>';
  document.getElementById('preview').innerHTML = h;
}

function exportPDF(){
  const content = document.getElementById('preview').innerHTML;
  const w = window.open('','_blank','width=800,height=600');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>body{font-family:-apple-system,sans-serif;padding:40px;max-width:700px;margin:0 auto;line-height:1.8}
h1{font-size:28px}h2{font-size:22px}h3{font-size:18px}
pre{background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto}
code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:14px}
pre code{background:none;padding:0}
blockquote{border-left:3px solid #3b82f6;padding-left:16px;color:#666}
</style></head><body>${content}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

function loadSample(){
  document.getElementById('input').value = `# Project Proposal
## Overview
This document outlines the **development plan** for the upcoming project.

## Timeline
- **Phase 1**: Requirements gathering (Week 1)
- **Phase 2**: Development (Week 2-3)
- **Phase 3**: Testing & deployment (Week 4)

## Technical Stack
- Frontend: React + TypeScript
- Backend: Python + FastAPI
- Database: PostgreSQL

> Note: All milestones are subject to client review.

## Code Example
\`\`\`python
def calculate_roi(investment, returns):
    return (returns - investment) / investment * 100

roi = calculate_roi(10000, 25000)
print(f"ROI: {roi}%")
\`\`\``;
  render();
}

window.onload = render;
</script>
</body>
</html>

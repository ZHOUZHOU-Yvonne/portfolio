<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF合并 | 在线工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333}
.wrap{max-width:700px;margin:0 auto;padding:20px}
header{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:16px 20px;margin-bottom:30px}
header a{color:#667eea;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px}
.desc{color:#888;margin-bottom:24px}
.drop-zone{border:2px dashed #ccc;border-radius:12px;padding:50px;text-align:center;background:#fff;transition:border-color .2s;cursor:pointer;margin-bottom:16px}
.drop-zone.drag-over{border-color:#667eea;background:#f0f0ff}
.drop-zone .icon{font-size:48px;margin-bottom:12px}
.drop-zone p{color:#888}
.btn{display:inline-block;padding:12px 24px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px}
.btn:hover{background:#5a6fd6}
.btn:disabled{opacity:.5;cursor:not-allowed}
.file-list{margin:16px 0}
.file-item{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:12px 16px;border-radius:8px;margin-bottom:8px}
.file-item .name{font-size:14px}
.file-item .size{color:#888;font-size:13px}
.file-item .remove{color:#e74c3c;cursor:pointer;font-size:20px}
.msg{padding:12px 16px;border-radius:8px;margin:16px 0;display:none}
.msg.success{background:#d4edda;color:#155724;display:block}
.msg.error{background:#f8d7da;color:#721c24;display:block}
.cta{text-align:center;margin-top:40px;padding:24px;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
.cta h4{margin-bottom:8px}
.cta p{color:#888;font-size:14px}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>📄 PDF 合并</h1>
<p class="desc">多个 PDF 文件合并为一个。所有处理在浏览器本地完成，文件不会上传到服务器，绝对安全。</p>

<div class="drop-zone" id="dropZone">
  <div class="icon">📁</div>
  <p>拖拽 PDF 文件到此处，或点击选择文件</p>
  <input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
</div>

<div class="file-list" id="fileList"></div>

<button class="btn" id="mergeBtn" disabled>合并 PDF</button>
<span id="status" class="msg"></span>

<div class="cta">
  <h4>需要批量处理或自动化 PDF 工作流？</h4>
  <p>承接 PDF 处理工具定制开发 —— 联系微信获取报价</p>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const mergeBtn = document.getElementById('mergeBtn');
const status = document.getElementById('status');
let files = [];

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(newFiles) {
  for (let f of newFiles) {
    if (f.type === 'application/pdf' || f.name.endsWith('.pdf')) {
      files.push(f);
    }
  }
  renderList();
}

function renderList() {
  fileList.innerHTML = files.map((f, i) =>
    `<div class="file-item"><span><span class="name">${f.name}</span> <span class="size">(${(f.size/1024).toFixed(1)} KB)</span></span><span class="remove" data-idx="${i}">×</span></div>`
  ).join('');
  document.querySelectorAll('.remove').forEach(el => el.addEventListener('click', e => {
    files.splice(e.target.dataset.idx, 1); renderList();
  }));
  mergeBtn.disabled = files.length < 2;
}

mergeBtn.addEventListener('click', async () => {
  try {
    status.className = 'msg success'; status.textContent = '正在合并，请稍候...';
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    for (let f of files) {
      const bytes = await f.arrayBuffer();
      const doc = await PDFDocument.load(bytes);
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    const pdfBytes = await merged.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'merged.pdf'; a.click();
    URL.revokeObjectURL(url);
    status.textContent = '合并完成！文件已下载';
  } catch(e) {
    status.className = 'msg error'; status.textContent = '合并失败：' + e.message;
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字数统计 | 在线工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333}
.wrap{max-width:700px;margin:0 auto;padding:20px}
header{background:#fff;padding:16px 20px;margin-bottom:30px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
header a{color:#667eea;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px}
.desc{color:#888;margin-bottom:24px}
textarea{width:100%;height:200px;padding:16px;border:1px solid #ddd;border-radius:12px;font-size:16px;resize:vertical;font-family:inherit}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin:20px 0}
.stat{background:#fff;padding:16px;border-radius:10px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#667eea}
.stat .label{font-size:13px;color:#888;margin-top:4px}
.cta{text-align:center;margin-top:40px;padding:24px;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>📝 字数统计</h1>
<p class="desc">实时统计中英文字数、字符数、段落数。纯本地处理，隐私安全。</p>

<textarea id="input" placeholder="在此输入或粘贴文本..."></textarea>

<div class="stats">
  <div class="stat"><div class="num" id="chars">0</div><div class="label">总字符数</div></div>
  <div class="stat"><div class="num" id="charsNoSpace">0</div><div class="label">字符数(无空格)</div></div>
  <div class="stat"><div class="num" id="words">0</div><div class="label">单词数</div></div>
  <div class="stat"><div class="num" id="cnChars">0</div><div class="label">中文字数</div></div>
  <div class="stat"><div class="num" id="lines">0</div><div class="label">行数</div></div>
  <div class="stat"><div class="num" id="paras">0</div><div class="label">段落数</div></div>
</div>

<div class="cta">
  <h4>需要文本处理或自动化工具？</h4>
  <p>承接文本批处理、内容分析工具定制 —— 联系微信获取报价</p>
</div>
</div>

<script>
const input = document.getElementById('input');
input.addEventListener('input', update);

function update() {
  const t = input.value;
  document.getElementById('chars').textContent = t.length;
  document.getElementById('charsNoSpace').textContent = t.replace(/\s/g, '').length;
  document.getElementById('words').textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('cnChars').textContent = (t.match(/[一-鿿]/g) || []).length;
  document.getElementById('lines').textContent = t ? t.split('\n').length : 0;
  document.getElementById('paras').textContent = t.trim() ? t.trim().split(/\n\s*\n/).length : 0;
}
</script>
</body>
</html>

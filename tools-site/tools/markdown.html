<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Markdown 预览 | DevTools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
header{background:#1e293b;padding:16px 20px;margin-bottom:30px;border-bottom:1px solid #334155}
header a{color:#3b82f6;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px;color:#f8fafc}
.desc{color:#94a3b8;margin-bottom:20px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.split{grid-template-columns:1fr}}
.panel h3{font-size:14px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
textarea{width:100%;height:400px;padding:16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:'SF Mono',Monaco,monospace;font-size:13px;resize:vertical}
.preview{border:1px solid #334155;border-radius:8px;padding:20px;height:400px;overflow:auto;background:#0f172a;line-height:1.8}
.preview h1,.preview h2,.preview h3{color:#f8fafc;margin:12px 0 8px}
.preview p{margin:8px 0;color:#cbd5e1}
.preview code{background:#1e293b;padding:2px 6px;border-radius:4px;font-size:13px;color:#fbbf24}
.preview pre{background:#1e293b;padding:16px;border-radius:8px;overflow:auto;margin:8px 0}
.preview pre code{background:none;padding:0;color:#86efac}
.preview a{color:#3b82f6}
.preview blockquote{border-left:3px solid #3b82f6;padding-left:16px;color:#94a3b8;margin:8px 0}
.preview ul,.preview ol{padding-left:24px;margin:8px 0}
.preview table{border-collapse:collapse;width:100%;margin:8px 0}
.preview th,.preview td{border:1px solid #334155;padding:8px 12px;text-align:left}
.preview th{background:#1e293b}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>MD Markdown 预览</h1>
<p class="desc">Markdown 实时预览。支持代码高亮、表格、引用。</p>
<div class="split">
<div class="panel"><h3>Markdown 输入</h3><textarea id="input" placeholder="输入 Markdown 文本..." oninput="renderMD()"># Hello Markdown

## 子标题

这是一段**粗体**和*斜体*文字。

- 列表项 1
- 列表项 2

> 引用文字

`内联代码`

```python
print('代码块')
```</textarea></div>
<div class="panel"><h3>预览</h3><div class="preview" id="preview"></div></div>
</div>
</div>
<script>
function renderMD(){const t=document.getElementById('input').value;document.getElementById('preview').innerHTML=parseMD(t)}
function parseMD(t){let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code class="language-$1">$2</code></pre>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/^#### (.+)$/gm,'<h4>$1</h4>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" style="max-width:100%">');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');h=h.replace(/\n{2,}/g,'</p><p>');h='<p>'+h+'</p>';return h}
window.onload=renderMD;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颜色选择器 | 在线工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333}
.wrap{max-width:600px;margin:0 auto;padding:20px}
header{background:#fff;padding:16px 20px;margin-bottom:30px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
header a{color:#667eea;text-decoration:none;font-size:14px}
h1{font-size:24px;margin:20px 0 8px}
.desc{color:#888;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:24px}
.picker-row{display:flex;gap:16px;align-items:center;margin-bottom:20px}
input[type=color]{width:80px;height:80px;border:none;cursor:pointer;border-radius:12px}
.color-display{width:80px;height:80px;border-radius:12px;border:2px solid #e8e8e8}
.values p{font-size:14px;margin:8px 0;display:flex;align-items:center}
.values code{background:#f0f0f0;padding:4px 10px;border-radius:4px;margin-left:8px;cursor:pointer;font-size:14px}
.palette{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.swatch{width:48px;height:48px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.swatch:hover{border-color:#333}
.cta{text-align:center;margin-top:40px;padding:24px;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
</style>
</head>
<body>
<header><a href="../index.html">← 返回工具集</a></header>
<div class="wrap">
<h1>🎨 颜色选择器</h1>
<p class="desc">在线取色，HEX/RGB/HSL 互转，调色板生成。</p>

<div class="card">
  <div class="picker-row">
    <input type="color" id="picker" value="#667eea">
    <div class="color-display" id="display" style="background:#667eea"></div>
  </div>
  <div class="values">
    <p>HEX：<code id="hex">#667eea</code></p>
    <p>RGB：<code id="rgb">rgb(102, 126, 234)</code></p>
    <p>HSL：<code id="hsl">hsl(229, 76%, 66%)</code></p>
  </div>
  <h4 style="margin:16px 0 8px;font-size:14px;color:#666">推荐调色板</h4>
  <div class="palette" id="palette"></div>
</div>

<div class="cta">
  <h4>需要定制设计工具？</h4>
  <p>承接调色板生成器、设计辅助工具定制 —— 联系微信获取报价</p>
</div>
</div>

<script>
const palettes = [
  ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7'],
  ['#2C3E50','#E74C3C','#ECF0F1','#3498DB','#2980B9'],
  ['#1A535C','#4ECDC4','#F7FFF7','#FF6B6B','#FFE66D'],
  ['#667eea','#764ba2','#f093fb','#4facfe','#43e97b'],
];
const paletteEl = document.getElementById('palette');
palettes.forEach(p => {
  p.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = c;
    sw.addEventListener('click', () => update(c));
    paletteEl.appendChild(sw);
  });
});

document.getElementById('picker').addEventListener('input', e => update(e.target.value));
document.querySelectorAll('code').forEach(el => {
  el.addEventListener('click', () => {
    navigator.clipboard.writeText(el.textContent).then(() => {
      el.textContent = '已复制!';
      setTimeout(() => update(document.getElementById('picker').value), 800);
    });
  });
});

function hexToRgb(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0,s,l=(max+min)/2;
  if(max!==min) {
    const d=max-min;
    s=l>.5?d/(2-max-min):d/(max+min);
    switch(max) {
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function update(hex) {
  document.getElementById('picker').value = hex;
  document.getElementById('display').style.background = hex;
  document.getElementById('hex').textContent = hex;
  const {r,g,b} = hexToRgb(hex);
  document.getElementById('rgb').textContent = `rgb(${r}, ${g}, ${b})`;
  const {h,s,l} = rgbToHsl(r,g,b);
  document.getElementById('hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
}
</script>
</body>
</html>
